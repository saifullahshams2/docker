version: "3"
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - 5678:5678
    environment:
      - WEBHOOK_URL=(add domain)
      - GENERIC_TIMEZONE=Asia/Riyadh
      - N8N_PROTOCOL=https
    volumes:
      - ./data:/home/node/.n8n
    restart: always
    networks:
      - n8nnet
      - caddynet

networks:
  n8nnet:
    driver: bridge
    name: n8nnet 
  caddynet:
    driver: bridge
    external: true
