# Docker Compose for Caddy Webserver

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - $PWD/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - caddy-net
networks:
  caddy-net:
    driver: bridge
